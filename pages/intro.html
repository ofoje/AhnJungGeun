<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안중근 — 들어가는 말</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="intro-page">
  <div class="page-wrapper">
    <main class="page-container intro">

      <!-- 배경 -->
      <div class="intro__bg" aria-hidden="true"></div>

      <!-- 상단 타이틀 -->
      <header class="intro__branding">
        <img
          src="../images/intro/title.svg"
          alt="안중근 — 독립과 평화를 위해 싸운 대한민국인"
          class="intro__title-image"
          width="362"
          height="60"
        >
      </header>

      <!-- 메인 콘텐츠 -->
      <section class="intro__main">
        <h1 class="intro__heading">들어가는 말</h1>

        <p class="intro__body">
          안중근(1879~1910)은 1909년 10월 26일 하얼빈역에서 우리나라 침략에 앞장섰던 이토 히로부미를 처단한 분이에요.
          '무기를 들고 나라를 위해 용감한 일을 해낸 영웅'을 "의사"라고 불러요.<br>
          우리나라의 독립과 세계평화를 소망했던 안중근 의사에 대해 알아 보아요.
        </p>

        <hr class="intro__divider">

        <p class="intro__learn-title">우리가 배울 내용은...</p>

        <ul class="intro__cards">
          <li>
            <article class="intro-card">
              <span class="intro-card__num">01</span>
              <p class="intro-card__text">안중근 의사의 일생 알아보기</p>
              <img
                src="../images/intro/icon_story.svg"
                alt=""
                class="intro-card__icon"
                width="52"
                height="50"
              >
            </article>
          </li>
          <li>
            <article class="intro-card">
              <span class="intro-card__num">02</span>
              <p class="intro-card__text">나만의 전시관 만들기</p>
              <img
                src="../images/intro/icon_gallery.svg"
                alt=""
                class="intro-card__icon"
                width="52"
                height="50"
              >
            </article>
          </li>
          <li>
            <article class="intro-card">
              <span class="intro-card__num">03</span>
              <p class="intro-card__text">안중근 의사에게 감사 전하기</p>
              <img
                src="../images/intro/icon_letter.svg"
                alt=""
                class="intro-card__icon"
                width="52"
                height="50"
              >
            </article>
          </li>
        </ul>

        <button type="button" class="btn btn--start" id="startBtn">시작하기</button>
      </section>

      <!-- 독립기념관 로고 -->
      <footer class="intro__logo">
        <img
          src="../images/intro/logo.svg"
          alt="독립기념관"
          class="intro__logo-image"
          width="233"
          height="39"
        >
      </footer>

    </main>
  </div>

  <script src="../js/script.js"></script>
</body>
</html>
